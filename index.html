<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Vault Graph Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .header { background-color: #16213e; border-bottom: 1px solid #0f3460; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header h1 { font-size: 24px; margin-bottom: 12px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; padding: 8px 12px; background-color: #0f3460; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; font-size: 14px; }
        .search-box::placeholder { color: #888; }
        .search-box:focus { outline: none; border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.3); }
        button { padding: 8px 16px; background-color: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s ease; }
        button:hover { background-color: #d1344a; box-shadow: 0 2px 8px rgba(233,69,96,0.4); }
        button:active { transform: scale(0.98); }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #graph-container { flex: 1; position: relative; background-color: #1a1a2e; }
        #graph { width: 100%; height: 100%; }
        .sidebar { width: 300px; background-color: #16213e; border-left: 1px solid #0f3460; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .stats-panel { background-color: #0f3460; padding: 16px; border-radius: 6px; border-left: 3px solid #e94560; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .stat:last-child { margin-bottom: 0; }
        .stat-label { color: #999; }
        .stat-value { font-weight: 600; color: #e94560; }
        .info-panel { background-color: #0f3460; padding: 16px; border-radius: 6px; border-left: 3px solid #1e90ff; max-height: 400px; overflow-y: auto; }
        .info-panel h3 { font-size: 14px; margin-bottom: 12px; color: #1e90ff; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-content { font-size: 13px; line-height: 1.6; color: #c0c0c0; }
        .info-content .label { color: #999; font-weight: 500; margin-top: 8px; margin-bottom: 4px; }
        .info-content .value { color: #e0e0e0; word-break: break-word; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { background-color: #1e90ff; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .legend { font-size: 12px; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 16px; height: 16px; border-radius: 50%; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 16px; }
        .error { display: flex; align-items: center; justify-content: center; height: 100%; color: #e94560; font-size: 14px; text-align: center; padding: 20px; }
        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .search-box { min-width: 100%; }
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; border-left: none; border-top: 1px solid #0f3460; }
            button { width: 100%; }
        }
        .sidebar::-webkit-scrollbar, .info-panel::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track, .info-panel::-webkit-scrollbar-track { background: #0f3460; }
        .sidebar::-webkit-scrollbar-thumb, .info-panel::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Obsidian Vault Graph</h1>
            <div class="controls">
                <input type="text" id="searchInput" class="search-box" placeholder="Search notes by title or folder..." autocomplete="off" aria-label="Search notes by title or folder">
                <button id="resetBtn" aria-label="Reset graph view to initial state">Reset View</button>
            </div>
        </div>
        <div class="main-content">
            <div id="graph-container" aria-label="Interactive force-directed graph visualization">
                <div class="loading">Loading graph data...</div>
            </div>
            <div class="sidebar">
                <div class="stats-panel">
                    <div class="stat"><span class="stat-label">Total Notes</span><span class="stat-value" id="totalNotes">-</span></div>
                    <div class="stat"><span class="stat-label">Total Links</span><span class="stat-value" id="totalLinks">-</span></div>
                    <div class="stat"><span class="stat-label">Folders</span><span class="stat-value" id="folderCount">-</span></div>
                    <div class="stat"><span class="stat-label">Orphan Notes</span><span class="stat-value" id="orphanCount">-</span></div>
                    <div class="stat"><span class="stat-label">Broken Links</span><span class="stat-value" id="brokenCount">-</span></div>
                </div>
                <div class="info-panel">
                    <h3>Selected Node</h3>
                    <div class="info-content" id="nodeInfo"><p>Click a node to view details</p></div>
                </div>
                <div class="legend">
                    <h3 style="font-size:14px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px 0;">Legend</h3>
                    <div class="legend-item"><div class="legend-color" style="background-color:#fff;border:2px solid #fff;"></div><span class="legend-text">Solid line = Wiki link</span></div>
                    <div class="legend-item"><div style="width:16px;height:2px;background:repeating-linear-gradient(90deg,#e94560 0px,#e94560 4px,transparent 4px,transparent 8px);"></div><span class="legend-text">Dashed = Broken link</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/force-graph"></script>
    <script>
        let graphData = null, graph = null, selectedNode = null;
        let highlightNodes = new Set(), highlightLinks = new Set();
        let searchFilter = '', searchTimeout = null;
        const folderColors = {};
        const colorPalette = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E2','#F8B88B','#A9DFBF','#F48FB1','#82E0AA','#FAD7A0','#D7BDE2','#AED6F1'];

        async function loadGraphData() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            try {
                const response = await fetch('graph-data.json', { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error('Failed to load graph-data.json: ' + response.status);
                graphData = await response.json();
                initializeGraph();
                updateStats();
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Error loading graph:', error);
                const container = document.querySelector('#graph-container');
                if (container) container.innerHTML = '<div class="error">Error loading graph data:<br>' + error.message + '</div>';
            }
        }

        function getFolderColor(folder) {
            if (!folderColors[folder]) {
                const index = Object.keys(folderColors).length % colorPalette.length;
                folderColors[folder] = colorPalette[index];
            }
            return folderColors[folder];
        }

        function prepareGraphData() {
            const nodes = graphData.nodes.map(node => ({
                ...node, color: getFolderColor(node.folder),
                size: Math.max(5, Math.min(30, 5 + node.link_count * 3))
            }));
            const edges = graphData.edges.map(edge => ({
                ...edge, stroke: edge.type === 'broken' ? '#e94560' : '#666',
                strokeDasharray: edge.type === 'broken' ? '5,5' : null,
                width: edge.type === 'broken' ? 1.5 : 1
            }));
            return { nodes, edges };
        }

        function initializeGraph() {
            const { nodes, edges } = prepareGraphData();
            const container = document.querySelector('#graph-container');
            container.innerHTML = '<div id="graph"></div>';
            graph = ForceGraph()
                .graphData({ nodes, links: edges })
                .nodeId('id')
                .nodeLabel(d => d.title)
                .nodeCanvasObject((node, ctx) => {
                    const size = node.size;
                    ctx.fillStyle = highlightNodes.size > 0 ? (highlightNodes.has(node.id) ? node.color : '#333') :
                                   (searchFilter && !matchesSearch(node) ? '#444' : node.color);
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
                    ctx.fill();
                    if (selectedNode === node.id) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
                    else if (highlightNodes.has(node.id)) { ctx.strokeStyle = '#1e90ff'; ctx.lineWidth = 1.5; ctx.stroke(); }
                })
                .linkColor(d => {
                    if (highlightLinks.has(d.source.id + '|' + d.target.id)) return '#1e90ff';
                    if (searchFilter && !(matchesSearch(d.source) || matchesSearch(d.target))) return '#222';
                    return d.stroke;
                })
                .linkWidth(d => highlightLinks.has(d.source.id + '|' + d.target.id) ? 2.5 : d.width)
                .linkLineDash(d => d.type === 'broken' ? [5, 5] : null)
                .onNodeClick(handleNodeClick)
                .onNodeHover(handleNodeHover)
                .onBackgroundClick(() => { selectedNode = null; highlightNodes.clear(); highlightLinks.clear(); updateNodeInfo(null); graph.refresh(); })
                (document.querySelector('#graph'));
            setTimeout(() => { graph.zoomToFit(400, 50); }, 500);
        }

        function handleNodeClick(node) {
            selectedNode = node.id;
            highlightNodes.clear(); highlightLinks.clear();
            highlightNodes.add(node.id);
            graphData.edges.forEach(edge => {
                const src = typeof edge.source === 'object' ? edge.source.id : edge.source;
                const tgt = typeof edge.target === 'object' ? edge.target.id : edge.target;
                if (src === node.id) { highlightNodes.add(tgt); highlightLinks.add(src + '|' + tgt); }
                if (tgt === node.id) { highlightNodes.add(src); highlightLinks.add(src + '|' + tgt); }
            });
            updateNodeInfo(node); graph.refresh();
        }

        function handleNodeHover(node) {
            if (selectedNode) return;
            highlightNodes.clear(); highlightLinks.clear();
            if (node) {
                highlightNodes.add(node.id);
                graphData.edges.forEach(edge => {
                    const src = typeof edge.source === 'object' ? edge.source.id : edge.source;
                    const tgt = typeof edge.target === 'object' ? edge.target.id : edge.target;
                    if (src === node.id) { highlightNodes.add(tgt); highlightLinks.add(src + '|' + tgt); }
                    if (tgt === node.id) { highlightNodes.add(src); highlightLinks.add(src + '|' + tgt); }
                });
            }
            graph.refresh();
        }

        function matchesSearch(node) {
            if (!searchFilter) return true;
            const term = searchFilter.toLowerCase();
            const n = typeof node === 'object' ? node : {};
            return (n.title || '').toLowerCase().includes(term) || (n.folder || '').toLowerCase().includes(term) || (n.id || '').toLowerCase().includes(term);
        }

        function updateNodeInfo(node) {
            const panel = document.querySelector('#nodeInfo');
            if (!node) { panel.innerHTML = '<p>Click a node to view details</p>'; return; }
            const tags = node.tags && node.tags.length > 0 ? node.tags.map(t => '<span class="tag">' + t + '</span>').join('') : '';
            panel.innerHTML = '<div class="label">Title</div><div class="value">' + node.title + '</div>' +
                '<div class="label">Folder</div><div class="value">' + (node.folder || 'Root') + '</div>' +
                '<div class="label">Links</div><div class="value">' + node.link_count + '</div>' +
                (tags ? '<div class="label">Tags</div><div class="tags">' + tags + '</div>' : '') +
                '<div class="label">Path</div><div class="value">' + node.id + '</div>';
        }

        function updateStats() {
            if (!graphData || !graphData.metadata) return;
            const m = graphData.metadata;
            document.querySelector('#totalNotes').textContent = m.total_notes;
            document.querySelector('#totalLinks').textContent = m.total_links;
            document.querySelector('#folderCount').textContent = m.folders.length;
            document.querySelector('#orphanCount').textContent = m.orphan_notes.length;
            document.querySelector('#brokenCount').textContent = m.broken_links.length;
        }

        function handleSearch(query) {
            searchFilter = query;
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { if (graph) graph.refresh(); }, 150);
        }

        function resetView() {
            selectedNode = null; highlightNodes.clear(); highlightLinks.clear(); searchFilter = '';
            document.querySelector('#searchInput').value = '';
            updateNodeInfo(null);
            if (graph) { graph.refresh(); setTimeout(() => { graph.zoomToFit(400, 50); }, 100); }
        }

        const searchInput = document.querySelector('#searchInput');
        if (searchInput) searchInput.addEventListener('input', e => handleSearch(e.target.value));
        const resetBtn = document.querySelector('#resetBtn');
        if (resetBtn) resetBtn.addEventListener('click', resetView);
        loadGraphData();
    </script>
</body>
</html>
