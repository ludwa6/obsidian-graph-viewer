<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Vault Graph Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .header { background-color: #16213e; border-bottom: 1px solid #0f3460; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header h1 { font-size: 24px; margin-bottom: 12px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; padding: 8px 12px; background-color: #0f3460; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; font-size: 14px; }
        .search-box::placeholder { color: #888; }
        .search-box:focus { outline: none; border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.3); }
        button { padding: 8px 16px; background-color: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s ease; }
        button:hover { background-color: #d1344a; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #graph-container { flex: 1; position: relative; background-color: #1a1a2e; }
        .sidebar { width: 300px; background-color: #16213e; border-left: 1px solid #0f3460; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .stats-panel { background-color: #0f3460; padding: 16px; border-radius: 6px; border-left: 3px solid #e94560; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .stat:last-child { margin-bottom: 0; }
        .stat-label { color: #999; }
        .stat-value { font-weight: 600; color: #e94560; }
        .info-panel { background-color: #0f3460; padding: 16px; border-radius: 6px; border-left: 3px solid #1e90ff; max-height: 400px; overflow-y: auto; }
        .info-panel h3 { font-size: 14px; margin-bottom: 12px; color: #1e90ff; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-content { font-size: 13px; line-height: 1.6; color: #c0c0c0; }
        .info-content .label { color: #999; font-weight: 500; margin-top: 8px; margin-bottom: 4px; }
        .info-content .value { color: #e0e0e0; word-break: break-word; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { background-color: #1e90ff; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .legend { font-size: 12px; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 16px; height: 16px; border-radius: 50%; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 16px; }
        .error { display: flex; align-items: center; justify-content: center; height: 100%; color: #e94560; font-size: 14px; text-align: center; padding: 20px; }
        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .search-box { min-width: 100%; }
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; border-left: none; border-top: 1px solid #0f3460; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Obsidian Vault Graph</h1>
            <div class="controls">
                <input type="text" id="searchInput" class="search-box" placeholder="Search notes by title or folder..." autocomplete="off" aria-label="Search notes">
                <button id="resetBtn">Reset View</button>
            </div>
        </div>
        <div class="main-content">
            <div id="graph-container">
                <div class="loading">Loading graph data...</div>
            </div>
            <div class="sidebar">
                <div class="stats-panel">
                    <div class="stat"><span class="stat-label">Total Notes</span><span class="stat-value" id="totalNotes">-</span></div>
                    <div class="stat"><span class="stat-label">Total Links</span><span class="stat-value" id="totalLinks">-</span></div>
                    <div class="stat"><span class="stat-label">Folders</span><span class="stat-value" id="folderCount">-</span></div>
                    <div class="stat"><span class="stat-label">Orphan Notes</span><span class="stat-value" id="orphanCount">-</span></div>
                    <div class="stat"><span class="stat-label">Broken Links</span><span class="stat-value" id="brokenCount">-</span></div>
                </div>
                <div class="info-panel">
                    <h3>Selected Node</h3>
                    <div class="info-content" id="nodeInfo"><p>Click a node to view details</p></div>
                </div>
                <div class="legend">
                    <h3 style="font-size:14px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px 0;">Legend</h3>
                    <div class="legend-item"><div class="legend-color" style="background-color:#aaa;border:2px solid #aaa;"></div><span>Solid line = Wiki link</span></div>
                    <div class="legend-item"><div style="width:16px;height:2px;background:repeating-linear-gradient(90deg,#e94560 0px,#e94560 4px,transparent 4px,transparent 8px);"></div><span>Dashed = Broken link</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/force-graph"></script>
    <script>
        // --- STATE ---
        let graphData = null;
        let graph = null;
        let selectedNode = null;
        let highlightNodes = new Set();
        let highlightLinks = new Set();
        let searchFilter = '';
        let searchTimeout = null;

        // Keep a COPY of edges with string IDs (force-graph mutates source/target to objects)
        let edgeIndex = [];

        const folderColors = {};
        const colorPalette = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
            '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A9DFBF',
            '#F48FB1', '#82E0AA', '#FAD7A0', '#D7BDE2', '#AED6F1'
        ];

        // --- HELPERS ---
        function getFolderColor(folder) {
            if (!folderColors[folder]) {
                folderColors[folder] = colorPalette[Object.keys(folderColors).length % colorPalette.length];
            }
            return folderColors[folder];
        }

        function nodeId(n) {
            return (typeof n === 'object' && n !== null) ? n.id : n;
        }

        function matchesSearch(node) {
            if (!searchFilter) return true;
            const term = searchFilter.toLowerCase();
            return (node.title || '').toLowerCase().includes(term) ||
                   (node.folder || '').toLowerCase().includes(term) ||
                   (node.id || '').toLowerCase().includes(term);
        }

        function getNodeOpacity(node) {
            if (highlightNodes.size > 0) {
                return highlightNodes.has(node.id) ? 1.0 : 0.15;
            }
            if (searchFilter) {
                return matchesSearch(node) ? 1.0 : 0.15;
            }
            return 1.0;
        }

        function getLinkKey(link) {
            return nodeId(link.source) + '|' + nodeId(link.target);
        }

        // --- LOAD DATA ---
        async function loadGraphData() {
            try {
                const response = await fetch('graph-data.json');
                if (!response.ok) throw new Error('Failed to load: ' + response.status);
                graphData = await response.json();

                // Store edge index BEFORE force-graph mutates the data
                edgeIndex = graphData.edges.map(e => ({
                    source: e.source,
                    target: e.target,
                    type: e.type
                }));

                initializeGraph();
                updateStats();
            } catch (error) {
                console.error('Error:', error);
                document.querySelector('#graph-container').innerHTML =
                    '<div class="error">Error loading graph data:<br>' + error.message + '</div>';
            }
        }

        // --- INIT GRAPH ---
        function initializeGraph() {
            const nodes = graphData.nodes.map(node => ({
                ...node,
                color: getFolderColor(node.folder),
                size: Math.max(4, Math.min(20, 4 + node.link_count * 4))
            }));

            const links = graphData.edges.map(edge => ({
                source: edge.source,
                target: edge.target,
                type: edge.type
            }));

            const container = document.querySelector('#graph-container');
            container.innerHTML = '';

            graph = ForceGraph()(container)
                .graphData({ nodes: nodes, links: links })
                .nodeId('id')
                .width(container.clientWidth)
                .height(container.clientHeight)
                .backgroundColor('#1a1a2e')
                // Spread nodes out: strong repulsion, long link distance
                .d3Force('charge', d3.forceManyBody().strength(-400))
                .d3Force('link', d3.forceLink().id(d => d.id).distance(120))
                .d3Force('center', d3.forceCenter())
                .d3Force('collide', d3.forceCollide().radius(d => (d.size || 5) + 15))
                .cooldownTime(3000)

                // --- NODE RENDERING: circle + label ---
                .nodeCanvasObject((node, ctx, globalScale) => {
                    const size = node.size || 5;
                    const opacity = getNodeOpacity(node);
                    const isSelected = (selectedNode === node.id);
                    const isHighlighted = highlightNodes.has(node.id);

                    // Draw circle
                    ctx.globalAlpha = opacity;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
                    ctx.fillStyle = node.color || '#999';
                    ctx.fill();

                    // Selection/highlight ring
                    if (isSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    } else if (isHighlighted) {
                        ctx.strokeStyle = '#1e90ff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    // Draw text label (only when zoomed in enough)
                    if (globalScale > 0.7 || isSelected || isHighlighted) {
                        const label = node.title || node.id;
                        const fontSize = Math.max(10, 12 / globalScale);
                        ctx.font = fontSize + 'px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';
                        ctx.fillStyle = 'rgba(255,255,255,' + (opacity * 0.9) + ')';
                        ctx.fillText(label, node.x, node.y + size + 2);
                    }

                    ctx.globalAlpha = 1;
                })
                .nodePointerAreaPaint((node, color, ctx) => {
                    const size = node.size || 5;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size + 3, 0, 2 * Math.PI);
                    ctx.fill();
                })

                // --- LINK RENDERING ---
                .linkCanvasObject((link, ctx, globalScale) => {
                    const src = link.source;
                    const tgt = link.target;
                    if (!src || !tgt || src.x == null || tgt.x == null) return;

                    const key = src.id + '|' + tgt.id;
                    const isHighlighted = highlightLinks.has(key);
                    const isBroken = link.type === 'broken';

                    // Determine opacity
                    let opacity = 0.6;
                    if (highlightLinks.size > 0) {
                        opacity = isHighlighted ? 1.0 : 0.08;
                    } else if (searchFilter) {
                        opacity = (matchesSearch(src) || matchesSearch(tgt)) ? 0.6 : 0.08;
                    }

                    ctx.globalAlpha = opacity;
                    ctx.beginPath();

                    if (isBroken) {
                        // Dashed line
                        ctx.setLineDash([5, 4]);
                        ctx.strokeStyle = isHighlighted ? '#ff6b8a' : '#e94560';
                        ctx.lineWidth = isHighlighted ? 2.5 : 1.5;
                    } else {
                        // Solid line
                        ctx.setLineDash([]);
                        ctx.strokeStyle = isHighlighted ? '#5dade2' : '#aaaaaa';
                        ctx.lineWidth = isHighlighted ? 2.5 : 1.5;
                    }

                    ctx.moveTo(src.x, src.y);
                    ctx.lineTo(tgt.x, tgt.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.globalAlpha = 1;
                })
                .linkPointerAreaPaint((link, color, ctx) => {
                    const src = link.source;
                    const tgt = link.target;
                    if (!src || !tgt || src.x == null || tgt.x == null) return;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(src.x, src.y);
                    ctx.lineTo(tgt.x, tgt.y);
                    ctx.stroke();
                })

                // --- EVENTS ---
                .onNodeClick(node => {
                    selectedNode = node.id;
                    rebuildHighlights(node.id);
                    updateNodeInfo(node);
                    graph.refresh();
                })
                .onNodeHover(node => {
                    if (selectedNode) return;
                    if (node) {
                        rebuildHighlights(node.id);
                    } else {
                        highlightNodes.clear();
                        highlightLinks.clear();
                    }
                    graph.refresh();
                })
                .onBackgroundClick(() => {
                    selectedNode = null;
                    highlightNodes.clear();
                    highlightLinks.clear();
                    updateNodeInfo(null);
                    graph.refresh();
                });

            // Zoom to fit after simulation settles
            setTimeout(() => graph.zoomToFit(400, 60), 1000);

            // Handle window resize
            window.addEventListener('resize', () => {
                if (graph) {
                    graph.width(container.clientWidth).height(container.clientHeight);
                }
            });
        }

        // --- HIGHLIGHT LOGIC (uses edgeIndex with original string IDs) ---
        function rebuildHighlights(nid) {
            highlightNodes.clear();
            highlightLinks.clear();
            highlightNodes.add(nid);

            edgeIndex.forEach(e => {
                if (e.source === nid) {
                    highlightNodes.add(e.target);
                    highlightLinks.add(e.source + '|' + e.target);
                }
                if (e.target === nid) {
                    highlightNodes.add(e.source);
                    highlightLinks.add(e.source + '|' + e.target);
                }
            });
        }

        // --- NODE INFO PANEL ---
        function updateNodeInfo(node) {
            const panel = document.querySelector('#nodeInfo');
            if (!node) {
                panel.innerHTML = '<p>Click a node to view details</p>';
                return;
            }
            const tags = (node.tags && node.tags.length > 0)
                ? node.tags.map(t => '<span class="tag">' + t + '</span>').join('')
                : '';
            panel.innerHTML =
                '<div class="label">Title</div><div class="value">' + node.title + '</div>' +
                '<div class="label">Folder</div><div class="value">' + (node.folder || 'Root') + '</div>' +
                '<div class="label">Links</div><div class="value">' + node.link_count + '</div>' +
                (tags ? '<div class="label">Tags</div><div class="tags">' + tags + '</div>' : '') +
                '<div class="label">Path</div><div class="value">' + node.id + '</div>';
        }

        // --- STATS ---
        function updateStats() {
            if (!graphData || !graphData.metadata) return;
            var m = graphData.metadata;
            document.querySelector('#totalNotes').textContent = m.total_notes;
            document.querySelector('#totalLinks').textContent = m.total_links;
            document.querySelector('#folderCount').textContent = m.folders.length;
            document.querySelector('#orphanCount').textContent = m.orphan_notes.length;
            document.querySelector('#brokenCount').textContent = m.broken_links.length;
        }

        // --- SEARCH ---
        document.querySelector('#searchInput').addEventListener('input', function(e) {
            searchFilter = e.target.value;
            // Must call refresh — canvas stops repainting after simulation cools
            if (graph) graph.refresh();
        });

        // --- RESET ---
        document.querySelector('#resetBtn').addEventListener('click', function() {
            selectedNode = null;
            highlightNodes.clear();
            highlightLinks.clear();
            searchFilter = '';
            document.querySelector('#searchInput').value = '';
            updateNodeInfo(null);
            if (graph) {
                // Slightly reheat simulation to force repaint
                graph.d3ReheatSimulation();
                setTimeout(() => graph.zoomToFit(400, 60), 300);
            }
        });

        // --- GO ---
        loadGraphData();
    </script>
</body>
</html>
