<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Vault Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    :root{--bg:#0a0f1a;--bg-card:#111827;--bg-panel:#1a2236;--border:#2a3a5c;--text:#e8edf5;--text-muted:#8899bb;--text-dim:#5a6a8c;--accent:#6366f1;--edge-wiki:#aaaaaa;--edge-broken:#ef4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(135deg,var(--bg) 0%,#0f1729 50%,#0a1020 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
    .header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(17,24,39,.85);backdrop-filter:blur(12px);flex-shrink:0;z-index:10}
    .header-left{display:flex;align-items:center;gap:14px}
    .header-logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px}
    .header h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
    .header .subtitle{font-size:11px;color:var(--text-muted)}
    .header-right{display:flex;align-items:center;gap:12px}
    .search-box{position:relative}
    .search-box input{width:220px;padding:7px 12px 7px 30px;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
    .search-box input:focus{border-color:var(--accent)}
    .search-box .icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4}
    .main{flex:1;display:flex;overflow:hidden;position:relative}
    .graph-container{flex:1;position:relative}
    .graph-container svg{display:block;width:100%;height:100%}

    /* Filter panel */
    .filter-panel{position:absolute;top:16px;left:16px;width:220px;background:rgba(17,24,39,.94);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;z-index:6;font-size:12px;max-height:calc(100vh - 180px);display:flex;flex-direction:column}
    .filter-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
    .filter-header:hover{background:rgba(99,102,241,.08)}
    .filter-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
    .filter-toggle-icon{font-size:14px;color:var(--text-dim);transition:transform .2s}
    .filter-toggle-icon.collapsed{transform:rotate(-90deg)}
    .filter-body{overflow-y:auto;padding:10px 14px 14px;flex:1}
    .filter-body.collapsed{display:none}
    .filter-section{margin-bottom:12px}
    .filter-section:last-child{margin-bottom:0}
    .filter-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px}
    .filter-row{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
    .filter-row:hover{color:var(--text)}
    .filter-row input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;width:14px;height:14px;flex-shrink:0}
    .filter-row label{cursor:pointer;display:flex;align-items:center;gap:6px;flex:1;min-width:0}
    .filter-row .tag-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .filter-row .tag-count{font-size:10px;color:var(--text-dim);flex-shrink:0}
    .filter-row .tag-swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .tag-select-all{font-size:10px;color:var(--accent);cursor:pointer;margin-left:auto;padding:2px 4px}
    .tag-select-all:hover{text-decoration:underline}

    .legend{position:absolute;bottom:16px;left:16px;background:rgba(17,24,39,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:11px;z-index:5}
    .legend-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
    .legend-grid{display:flex;gap:20px}
    .legend-col{display:flex;flex-direction:column;gap:5px}
    .legend-item{display:flex;align-items:center;gap:8px;color:var(--text-muted)}
    .legend-node{width:12px;height:12px;border-radius:50%}
    .legend-hint{font-size:9px;color:var(--text-dim);margin-top:6px}
    .tooltip{position:absolute;top:16px;right:320px;background:rgba(17,24,39,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:12px 16px;max-width:280px;pointer-events:none;z-index:5;opacity:0;transform:translateY(-4px);transition:opacity .15s,transform .15s}
    .tooltip.visible{opacity:1;transform:translateY(0)}
    .tooltip-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .tooltip-dot{width:10px;height:10px;border-radius:50%}
    .tooltip-name{font-weight:700;font-size:14px}
    .tooltip-meta{font-size:11px;color:var(--text-muted);line-height:1.4}
    .detail-panel{width:300px;min-width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg-card);padding:20px;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease-out;z-index:5}
    .detail-panel.open{transform:translateX(0)}
    .detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
    .detail-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
    .detail-name{font-size:15px;font-weight:700}
    .detail-type{margin-top:2px;font-size:11px;color:var(--text-dim)}
    .close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px}
    .close-btn:hover{color:var(--text)}
    .info-box{padding:12px 14px;background:var(--bg-panel);border-radius:10px;margin-bottom:12px}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:4px}
    .info-value{font-size:13px;line-height:1.5}
    .conn-list{display:flex;flex-direction:column;gap:6px}
    .conn-item{padding:10px 12px;background:var(--bg-panel);border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
    .conn-item:hover{background:rgba(58,74,108,.3)}
    .conn-bar{width:4px;height:24px;border-radius:2px;flex-shrink:0}
    .conn-name{font-size:13px;font-weight:500}
    .conn-type{font-size:10px;color:var(--text-dim)}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .stat-box{text-align:center;padding:8px 4px;background:rgba(10,15,26,.5);border-radius:6px}
    .stat-value{font-size:18px;font-weight:700;color:var(--accent)}
    .stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
    .loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:20;transition:opacity .5s}
    .loading-overlay.hidden{opacity:0;pointer-events:none}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:14px;font-size:13px;color:var(--text-muted)}
    .tag{display:inline-block;background:rgba(99,102,241,.2);color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:10px;margin:2px 2px 2px 0}
    @media(max-width:768px){.header{padding:10px 14px}.header h1{font-size:14px}.search-box input{width:140px}.detail-panel{width:260px;min-width:260px}.legend{bottom:10px;left:10px;padding:10px 14px}.filter-panel{width:180px;left:10px;top:10px}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📝</div>
      <div><h1>Obsidian Vault Graph</h1><div class="subtitle">Interactive note visualization</div></div>
    </div>
    <div class="header-right">
      <div class="search-box"><span class="icon">🔍</span><input type="text" id="searchInput" placeholder="Search notes by title or folder..." /></div>
    </div>
  </div>
  <div class="main">
    <div class="graph-container" id="graphContainer">
      <svg id="graphSvg"></svg>
      <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">Loading vault data...</div></div>

      <!-- Filter Panel -->
      <div class="filter-panel" id="filterPanel">
        <div class="filter-header" id="filterHeader">
          <span class="filter-title">Filters</span>
          <span class="filter-toggle-icon" id="filterToggleIcon">▾</span>
        </div>
        <div class="filter-body" id="filterBody">
          <!-- Display toggles -->
          <div class="filter-section">
            <div class="filter-section-label">Display</div>
            <div class="filter-row">
              <input type="checkbox" id="filterOrphans" checked />
              <label for="filterOrphans">Show orphans</label>
            </div>
            <div class="filter-row">
              <input type="checkbox" id="filterBroken" checked />
              <label for="filterBroken">Show broken links</label>
            </div>
            <div class="filter-row">
              <input type="checkbox" id="filterExistingOnly" />
              <label for="filterExistingOnly">Existing files only</label>
            </div>
          </div>
          <!-- Tag edges section (populated dynamically) -->
          <div class="filter-section" id="tagEdgesSection" style="display:none">
            <div style="display:flex;align-items:center;gap:4px">
              <span class="filter-section-label" style="margin-bottom:0">Tag Edges</span>
              <span class="tag-select-all" id="tagSelectAll">all</span>
              <span class="tag-select-all" id="tagSelectNone">none</span>
            </div>
            <div id="tagCheckboxes" style="margin-top:6px"></div>
          </div>
        </div>
      </div>

      <div class="legend" id="legendPanel">
        <div class="legend-title">Legend</div>
        <div class="legend-grid">
          <div class="legend-col" id="folderLegend"></div>
          <div class="legend-col" id="edgeLegend">
            <div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#aaaaaa" stroke-width="2"/></svg>Wiki link</div>
            <div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/></svg>Broken link</div>
          </div>
        </div>
        <div class="legend-hint">Drag nodes · Scroll to zoom · Click for details</div>
      </div>
      <div class="tooltip" id="tooltip">
        <div class="tooltip-header"><div class="tooltip-dot" id="tooltipDot"></div><span class="tooltip-name" id="tooltipName"></span></div>
        <div class="tooltip-meta" id="tooltipMeta"></div>
      </div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="detail-icon" id="detailIcon"></div>
          <div><div class="detail-name" id="detailName"></div><div class="detail-type" id="detailType"></div></div>
        </div>
        <button class="close-btn" id="detailClose">✕</button>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div id="tagsBox" class="info-box" style="display:none"><div class="section-label">Tags</div><div id="tagsContent"></div></div>
      <div class="section-label" id="connLabel">Connections (0)</div>
      <div class="conn-list" id="connList"></div>
    </div>
  </div>
  <script>
    // --- CONFIG ---
    const FOLDER_COLORS = [
      '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981',
      '#06b6d4', '#f97316', '#6366f1', '#14b8a6', '#e879f9'
    ];
    const TAG_EDGE_COLORS = [
      '#f472b6', '#a78bfa', '#34d399', '#fbbf24', '#60a5fa',
      '#f87171', '#4ade80', '#c084fc', '#fb923c', '#22d3ee',
      '#a3e635', '#e879f9', '#facc15', '#38bdf8', '#f43f5e',
      '#2dd4bf', '#818cf8', '#fb7185', '#86efac', '#fcd34d'
    ];
    const folderColorMap = {};
    const tagColorMap = {};
    let colorIdx = 0;
    let tagColorIdx = 0;

    function getFolderColor(folder) {
      const key = folder || '(root)';
      if (!folderColorMap[key]) {
        folderColorMap[key] = FOLDER_COLORS[colorIdx % FOLDER_COLORS.length];
        colorIdx++;
      }
      return folderColorMap[key];
    }

    function getTagColor(tag) {
      if (!tagColorMap[tag]) {
        tagColorMap[tag] = TAG_EDGE_COLORS[tagColorIdx % TAG_EDGE_COLORS.length];
        tagColorIdx++;
      }
      return tagColorMap[tag];
    }

    function nodeRadius(d) {
      return Math.max(6, Math.min(22, 6 + d.link_count * 3));
    }

    // --- STATE ---
    let graphData = null;
    let selectedNode = null;
    let simulation = null;
    let tagIndex = {};        // tag -> [nodeId, ...]
    let allTagEdges = [];     // precomputed full set of tag edges
    let filterState = {
      showOrphans: true,
      showBroken: true,
      existingOnly: false,
      activeTags: new Set()   // tags whose edges are currently shown
    };

    // --- LOAD DATA ---
    async function loadData() {
      const r = await fetch('graph-data.json');
      if (!r.ok) throw new Error('Failed to load: ' + r.status);
      return r.json();
    }

    // --- TAG EDGE SYNTHESIS ---
    function buildTagIndex(nodes) {
      tagIndex = {};
      nodes.forEach(n => {
        const tags = (n.frontmatter && n.frontmatter.tags) || [];
        tags.forEach(t => {
          if (!tagIndex[t]) tagIndex[t] = [];
          tagIndex[t].push(n.id);
        });
      });
    }

    function computeAllTagEdges() {
      allTagEdges = [];
      const seen = new Set();
      Object.entries(tagIndex).forEach(([tag, nodeIds]) => {
        if (nodeIds.length < 2) return;
        for (let i = 0; i < nodeIds.length; i++) {
          for (let j = i + 1; j < nodeIds.length; j++) {
            const key = nodeIds[i] < nodeIds[j]
              ? nodeIds[i] + '|' + nodeIds[j] + '|' + tag
              : nodeIds[j] + '|' + nodeIds[i] + '|' + tag;
            if (!seen.has(key)) {
              seen.add(key);
              allTagEdges.push({
                source: nodeIds[i],
                target: nodeIds[j],
                type: 'tag',
                tag: tag
              });
            }
          }
        }
      });
    }

    function getActiveTagEdges() {
      return allTagEdges.filter(e => filterState.activeTags.has(e.tag));
    }

    // --- BUILD FILTER UI ---
    function buildFilterUI() {
      const section = document.getElementById('tagEdgesSection');
      const container = document.getElementById('tagCheckboxes');
      container.innerHTML = '';

      // Sort tags by node count descending
      const sortedTags = Object.entries(tagIndex)
        .filter(([, ids]) => ids.length >= 2)
        .sort((a, b) => b[1].length - a[1].length);

      if (sortedTags.length === 0) return;
      section.style.display = 'block';

      sortedTags.forEach(([tag, nodeIds]) => {
        const color = getTagColor(tag);
        const row = document.createElement('div');
        row.className = 'filter-row';
        row.innerHTML =
          '<input type="checkbox" id="tag_' + tag + '" />' +
          '<label for="tag_' + tag + '">' +
            '<span class="tag-swatch" style="background:' + color + '"></span>' +
            '<span class="tag-label">' + tag + '</span>' +
            '<span class="tag-count">(' + nodeIds.length + ')</span>' +
          '</label>';
        const cb = row.querySelector('input');
        cb.addEventListener('change', () => {
          if (cb.checked) filterState.activeTags.add(tag);
          else filterState.activeTags.delete(tag);
          applyFilters();
        });
        container.appendChild(row);
      });

      // Select all / none
      document.getElementById('tagSelectAll').addEventListener('click', () => {
        sortedTags.forEach(([tag]) => filterState.activeTags.add(tag));
        container.querySelectorAll('input').forEach(cb => cb.checked = true);
        applyFilters();
      });
      document.getElementById('tagSelectNone').addEventListener('click', () => {
        filterState.activeTags.clear();
        container.querySelectorAll('input').forEach(cb => cb.checked = false);
        applyFilters();
      });
    }

    // --- FILTER PANEL COLLAPSE ---
    document.getElementById('filterHeader').addEventListener('click', () => {
      const body = document.getElementById('filterBody');
      const icon = document.getElementById('filterToggleIcon');
      body.classList.toggle('collapsed');
      icon.classList.toggle('collapsed');
    });

    // --- DISPLAY FILTER WIRING ---
    document.getElementById('filterOrphans').addEventListener('change', function() {
      filterState.showOrphans = this.checked;
      applyFilters();
    });
    document.getElementById('filterBroken').addEventListener('change', function() {
      filterState.showBroken = this.checked;
      applyFilters();
    });
    document.getElementById('filterExistingOnly').addEventListener('change', function() {
      filterState.existingOnly = this.checked;
      if (this.checked) {
        // Existing-only implies hiding broken links
        document.getElementById('filterBroken').checked = false;
        filterState.showBroken = false;
      }
      applyFilters();
    });

    // --- RENDER GRAPH ---
    function renderGraph(data) {
      graphData = data;
      const container = document.getElementById('graphContainer');
      const width = container.clientWidth;
      const height = container.clientHeight;

      const svg = d3.select('#graphSvg')
        .attr('width', width)
        .attr('height', height);
      svg.selectAll('*').remove();

      // Defs for glow filter
      const defs = svg.append('defs');
      const glow = defs.append('filter')
        .attr('id', 'glow').attr('x', '-50%').attr('y', '-50%')
        .attr('width', '200%').attr('height', '200%');
      glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
      const merge = glow.append('feMerge');
      merge.append('feMergeNode').attr('in', 'blur');
      merge.append('feMergeNode').attr('in', 'SourceGraphic');

      // Main group for zoom/pan
      const g = svg.append('g');
      const zoom = d3.zoom().scaleExtent([0.2, 4])
        .on('zoom', e => g.attr('transform', e.transform));
      svg.call(zoom);

      // Prepare nodes
      const nodes = data.nodes.map(n => ({
        ...n,
        radius: nodeRadius(n),
        color: getFolderColor(n.folder)
      }));

      // Build tag index and precompute all tag edges
      buildTagIndex(data.nodes);
      computeAllTagEdges();
      buildFilterUI();

      // Prepare wikilink edges (broken targets get a phantom node)
      const nodeIds = new Set(nodes.map(n => n.id));
      const phantomNodes = [];
      data.edges.forEach(e => {
        if (!nodeIds.has(e.target)) {
          phantomNodes.push({
            id: e.target, title: e.target, folder: '(broken)',
            tags: [], link_count: 0, radius: 5, color: '#ef4444',
            phantom: true, frontmatter: {}
          });
          nodeIds.add(e.target);
        }
      });
      const allNodes = nodes.concat(phantomNodes);

      // Base wikilink edges
      const baseLinks = data.edges.map(e => ({
        source: e.source,
        target: e.target,
        type: e.type
      }));

      // Store master data for filtering
      window._masterData = { allNodes, baseLinks, phantomNodes };

      // Apply initial filters
      applyFiltersInternal(g, svg, zoom, width, height);
    }

    // --- APPLY FILTERS (re-renders the simulation) ---
    function applyFilters() {
      if (!window._masterData) return;
      const container = document.getElementById('graphContainer');
      const width = container.clientWidth;
      const height = container.clientHeight;
      const svg = d3.select('#graphSvg');
      const g = svg.select('g');
      const zoom = d3.zoom().scaleExtent([0.2, 4])
        .on('zoom', e => g.attr('transform', e.transform));

      applyFiltersInternal(g, svg, zoom, width, height);
    }

    function applyFiltersInternal(g, svg, zoom, width, height) {
      const { allNodes, baseLinks, phantomNodes } = window._masterData;

      // Determine which tag edges are active
      const activeTagEdges = getActiveTagEdges();

      // Combine base + tag edges
      let links = baseLinks.concat(activeTagEdges);

      // Filter: existing files only (hides all phantoms)
      let visibleNodes = allNodes;
      if (filterState.existingOnly) {
        const phantomIds = new Set(phantomNodes.map(n => n.id));
        visibleNodes = visibleNodes.filter(n => !phantomIds.has(n.id));
        links = links.filter(l => {
          const sid = l.source.id || l.source;
          const tid = l.target.id || l.target;
          return !phantomIds.has(sid) && !phantomIds.has(tid);
        });
      } else if (!filterState.showBroken) {
        // Hide broken link phantoms and broken-type edges
        visibleNodes = visibleNodes.filter(n => !n.phantom);
        links = links.filter(l => l.type !== 'broken');
      }

      // Build adjacency from current links to determine orphan status
      const visibleNodeIds = new Set(visibleNodes.map(n => n.id));
      links = links.filter(l => {
        const sid = l.source.id || l.source;
        const tid = l.target.id || l.target;
        return visibleNodeIds.has(sid) && visibleNodeIds.has(tid);
      });

      if (!filterState.showOrphans) {
        // Compute connected set from current links
        const connected = new Set();
        links.forEach(l => {
          connected.add(l.source.id || l.source);
          connected.add(l.target.id || l.target);
        });
        visibleNodes = visibleNodes.filter(n => connected.has(n.id));
        // Re-filter links
        const finalIds = new Set(visibleNodes.map(n => n.id));
        links = links.filter(l => {
          const sid = l.source.id || l.source;
          const tid = l.target.id || l.target;
          return finalIds.has(sid) && finalIds.has(tid);
        });
      }

      // Deep-copy nodes to avoid d3 mutation issues across re-renders
      const renderNodes = visibleNodes.map(n => ({
        ...n,
        x: n.x, y: n.y
      }));
      const renderLinks = links.map(l => ({
        source: l.source.id || l.source,
        target: l.target.id || l.target,
        type: l.type,
        tag: l.tag || null
      }));

      // Clear and re-render
      g.selectAll('*').remove();

      if (simulation) simulation.stop();

      // Force simulation
      simulation = d3.forceSimulation(renderNodes)
        .force('link', d3.forceLink(renderLinks).id(d => d.id)
          .distance(d => {
            if (d.type === 'tag') return 100;
            if (d.type === 'broken') return 80;
            return 120;
          })
          .strength(d => d.type === 'tag' ? 0.2 : 0.4))
        .force('charge', d3.forceManyBody().strength(-400).distanceMax(400))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.radius + 14))
        .force('x', d3.forceX(width / 2).strength(0.04))
        .force('y', d3.forceY(height / 2).strength(0.04));

      // Draw links
      const link = g.append('g').selectAll('line')
        .data(renderLinks).join('line')
        .attr('stroke', d => {
          if (d.type === 'tag') return getTagColor(d.tag);
          if (d.type === 'broken') return '#ef4444';
          return '#aaaaaa';
        })
        .attr('stroke-width', d => {
          if (d.type === 'tag') return 1.2;
          if (d.type === 'broken') return 1.5;
          return 2;
        })
        .attr('stroke-dasharray', d => {
          if (d.type === 'broken') return '5,4';
          if (d.type === 'tag') return '3,3';
          return null;
        })
        .attr('stroke-opacity', d => d.type === 'tag' ? 0.35 : 0.5);

      // Draw nodes
      const node = g.append('g').selectAll('g')
        .data(renderNodes).join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      // Node circles
      node.append('circle')
        .attr('r', d => d.radius)
        .attr('fill', d => d.color + (d.phantom ? '33' : '22'))
        .attr('stroke', d => d.color)
        .attr('stroke-width', d => d.phantom ? 1 : 2)
        .attr('stroke-dasharray', d => d.phantom ? '3,3' : null)
        .attr('filter', 'url(#glow)');

      // Inner dot
      node.append('circle')
        .attr('r', d => d.phantom ? 2 : Math.max(3, d.radius * 0.3))
        .attr('fill', d => d.color)
        .attr('opacity', 0.8);

      // Labels
      node.append('text')
        .text(d => d.title || d.id)
        .attr('text-anchor', 'middle')
        .attr('dy', d => d.radius + 14)
        .attr('fill', '#e8edf5')
        .attr('font-size', '11px')
        .attr('font-weight', '500')
        .attr('paint-order', 'stroke')
        .attr('stroke', '#0a0f1a')
        .attr('stroke-width', 3);

      // Hover
      node.on('mouseenter', function(event, d) {
        if (selectedNode) return;
        showTooltip(d);
        d3.select(this).select('circle').transition().duration(200)
          .attr('r', d.radius * 1.15);
        link.transition().duration(200)
          .attr('stroke-opacity', l =>
            (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id ? 0.9 : 0.08);
        node.transition().duration(200)
          .attr('opacity', n => {
            if (n.id === d.id) return 1;
            return renderLinks.some(l =>
              ((l.source.id || l.source) === d.id && (l.target.id || l.target) === n.id) ||
              ((l.target.id || l.target) === d.id && (l.source.id || l.source) === n.id)
            ) ? 1 : 0.2;
          });
      });

      node.on('mouseleave', function(event, d) {
        if (selectedNode) return;
        hideTooltip();
        d3.select(this).select('circle').transition().duration(200)
          .attr('r', d.radius);
        link.transition().duration(200).attr('stroke-opacity', l => l.type === 'tag' ? 0.35 : 0.5);
        node.transition().duration(200).attr('opacity', 1);
      });

      // Click
      node.on('click', (event, d) => {
        event.stopPropagation();
        showDetail(d, renderLinks);
      });
      svg.on('click', () => hideDetail());

      // Tick
      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });

      // Store refs for search
      window._graphRefs = { node, link, links: renderLinks, allNodes: renderNodes };

      // Update stats in legend
      updateFilteredStats(renderNodes, renderLinks);

      // Update tag edge legend items
      updateEdgeLegend();
    }

    // --- UPDATE STATS ---
    function updateFilteredStats(nodes, links) {
      const statsEl = document.getElementById('filteredStats');
      if (statsEl) {
        const orphanCount = nodes.filter(n => {
          return !links.some(l =>
            (l.source.id || l.source) === n.id || (l.target.id || l.target) === n.id
          );
        }).length;
        const wikiLinks = links.filter(l => l.type === 'wikilink').length;
        const tagLinks = links.filter(l => l.type === 'tag').length;
        const brokenLinks = links.filter(l => l.type === 'broken').length;
        statsEl.innerHTML = nodes.length + ' notes \u00b7 ' +
          wikiLinks + ' wiki \u00b7 ' +
          tagLinks + ' tag \u00b7 ' +
          brokenLinks + ' broken \u00b7 ' +
          orphanCount + ' orphans';
      }
    }

    // --- UPDATE EDGE LEGEND ---
    function updateEdgeLegend() {
      const col = document.getElementById('edgeLegend');
      col.innerHTML = '';
      // Always show wikilink
      col.innerHTML += '<div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#aaaaaa" stroke-width="2"/></svg>Wiki link</div>';
      if (filterState.showBroken || !filterState.existingOnly) {
        col.innerHTML += '<div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/></svg>Broken link</div>';
      }
      // Show active tag edge colors
      filterState.activeTags.forEach(tag => {
        const color = getTagColor(tag);
        col.innerHTML += '<div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="' + color + '" stroke-width="1.2" stroke-dasharray="3,3"/></svg>#' + tag + '</div>';
      });
    }

    // --- TOOLTIP ---
    function showTooltip(d) {
      document.getElementById('tooltipDot').style.background = d.color;
      document.getElementById('tooltipName').textContent = d.title || d.id;
      const fmTags = (d.frontmatter && d.frontmatter.tags) || [];
      const meta = (d.folder || 'Root') + ' \u00b7 ' + d.link_count + ' link' + (d.link_count !== 1 ? 's' : '') +
        (d.phantom ? ' \u00b7 Broken target' : '') +
        (fmTags.length > 0 ? ' \u00b7 Tags: ' + fmTags.join(', ') : '') +
        ' \u00b7 Click for details';
      document.getElementById('tooltipMeta').textContent = meta;
      document.getElementById('tooltip').classList.add('visible');
    }
    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    // --- DETAIL PANEL ---
    function showDetail(d, currentLinks) {
      selectedNode = d;
      hideTooltip();
      const panel = document.getElementById('detailPanel');
      const icon = document.getElementById('detailIcon');
      icon.style.border = '2.5px solid ' + d.color;
      icon.style.background = d.color + '22';
      icon.textContent = d.phantom ? '\u26a0' : '\u25c9';
      document.getElementById('detailName').textContent = d.title || d.id;
      document.getElementById('detailType').textContent = d.phantom ? 'Broken link target' : (d.folder || 'Root');

      // Stats
      const connCount = currentLinks ? currentLinks.filter(l => {
        const sid = l.source.id || l.source;
        const tid = l.target.id || l.target;
        return sid === d.id || tid === d.id;
      }).length : d.link_count;
      document.getElementById('statsGrid').innerHTML = [
        { label: 'Links', value: connCount, color: d.color },
        { label: 'Folder', value: d.folder ? d.folder.split('/').pop() : 'Root', color: d.color }
      ].map(s => '<div class="stat-box"><div class="stat-value" style="color:' + s.color + '">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>').join('');

      // Tags
      const fmTags = (d.frontmatter && d.frontmatter.tags) || [];
      const tagsBox = document.getElementById('tagsBox');
      if (fmTags.length > 0) {
        tagsBox.style.display = 'block';
        document.getElementById('tagsContent').innerHTML = fmTags.map(t => '<span class="tag">#' + t + '</span>').join('');
      } else if (d.tags && d.tags.length > 0) {
        tagsBox.style.display = 'block';
        document.getElementById('tagsContent').innerHTML = d.tags.map(t => '<span class="tag">#' + t + '</span>').join('');
      } else {
        tagsBox.style.display = 'none';
      }

      // Connections (from current filtered links)
      const linksToUse = currentLinks || (window._graphRefs ? window._graphRefs.links : []);
      const conns = linksToUse.filter(e => {
        const sid = e.source.id || e.source;
        const tid = e.target.id || e.target;
        return sid === d.id || tid === d.id;
      });
      document.getElementById('connLabel').textContent = 'Connections (' + conns.length + ')';
      const connList = document.getElementById('connList');
      connList.innerHTML = '';
      conns.forEach(conn => {
        const sid = conn.source.id || conn.source;
        const tid = conn.target.id || conn.target;
        const otherId = sid === d.id ? tid : sid;
        const otherNode = window._graphRefs?.allNodes.find(n => n.id === otherId);
        const name = otherNode ? (otherNode.title || otherNode.id) : otherId;
        const barColor = conn.type === 'tag' ? getTagColor(conn.tag) : (conn.type === 'broken' ? '#ef4444' : '#aaaaaa');
        const typeLabel = conn.type === 'tag' ? 'tag: #' + conn.tag : conn.type + (conn.type === 'broken' ? ' (missing)' : '');
        const item = document.createElement('div');
        item.className = 'conn-item';
        item.innerHTML =
          '<div class="conn-bar" style="background:' + barColor + '"></div>' +
          '<div><div class="conn-name">' + name + '</div>' +
          '<div class="conn-type">' + (sid === d.id ? '\u2192' : '\u2190') + ' ' + typeLabel + '</div></div>';
        if (otherNode) {
          item.addEventListener('click', () => showDetail(otherNode, linksToUse));
        }
        connList.appendChild(item);
      });

      panel.classList.add('open');
    }

    function hideDetail() {
      selectedNode = null;
      document.getElementById('detailPanel').classList.remove('open');
      if (window._graphRefs) {
        window._graphRefs.node.transition().duration(200).attr('opacity', 1);
        window._graphRefs.link.transition().duration(200).attr('stroke-opacity', l => l.type === 'tag' ? 0.35 : 0.5);
      }
    }

    // --- SEARCH ---
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      if (!window._graphRefs) return;
      window._graphRefs.node.transition().duration(200)
        .attr('opacity', d => {
          if (!q) return 1;
          const name = (d.title || d.id || '').toLowerCase();
          const folder = (d.folder || '').toLowerCase();
          const tags = ((d.frontmatter && d.frontmatter.tags) || []).join(' ').toLowerCase();
          return name.includes(q) || folder.includes(q) || tags.includes(q) ? 1 : 0.1;
        });
      window._graphRefs.link.transition().duration(200)
        .attr('stroke-opacity', l => {
          if (!q) return l.type === 'tag' ? 0.35 : 0.5;
          const sn = (l.source.title || l.source.id || '').toLowerCase();
          const tn = (l.target.title || l.target.id || '').toLowerCase();
          const sf = (l.source.folder || '').toLowerCase();
          const tf = (l.target.folder || '').toLowerCase();
          return (sn.includes(q) || tn.includes(q) || sf.includes(q) || tf.includes(q)) ? 0.5 : 0.05;
        });
    });

    // --- CLOSE PANEL ---
    document.getElementById('detailClose').addEventListener('click', hideDetail);

    // --- RESIZE ---
    window.addEventListener('resize', () => { if (graphData) renderGraph(graphData); });

    // --- LEGEND ---
    function buildLegend() {
      const el = document.getElementById('folderLegend');
      el.innerHTML = '';
      Object.entries(folderColorMap).forEach(([folder, color]) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<div class="legend-node" style="border:2px solid ' + color + ';background:' + color + '22"></div>' + folder;
        el.appendChild(item);
      });
    }

    // --- BOOT ---
    (async () => {
      try {
        const data = await loadData();
        data.nodes.forEach(n => getFolderColor(n.folder));
        renderGraph(data);
        buildLegend();

        const m = data.metadata;
        const statsEl = document.createElement('div');
        statsEl.id = 'filteredStats';
        statsEl.style.cssText = 'margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim)';
        statsEl.innerHTML = m.total_notes + ' notes \u00b7 ' + m.total_links + ' links \u00b7 ' +
          m.folders.length + ' folders \u00b7 ' + m.orphan_notes.length + ' orphans \u00b7 ' +
          m.broken_links.length + ' broken';
        document.getElementById('legendPanel').appendChild(statsEl);

        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.add('hidden');
        }, 600);
      } catch (err) {
        document.getElementById('loadingOverlay').innerHTML =
          '<div style="color:#ef4444;font-size:14px">Error: ' + err.message + '</div>';
      }
    })();
  </script>
</body>
</html>
