<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Vault Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    :root{--bg:#0a0f1a;--bg-card:#111827;--bg-panel:#1a2236;--border:#2a3a5c;--text:#e8edf5;--text-muted:#8899bb;--text-dim:#5a6a8c;--accent:#6366f1;--edge-wiki:#aaaaaa;--edge-broken:#ef4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(135deg,var(--bg) 0%,#0f1729 50%,#0a1020 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
    .header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(17,24,39,.85);backdrop-filter:blur(12px);flex-shrink:0;z-index:10}
    .header-left{display:flex;align-items:center;gap:14px}
    .header-logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px}
    .header h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
    .header .subtitle{font-size:11px;color:var(--text-muted)}
    .header-right{display:flex;align-items:center;gap:12px}
    .search-box{position:relative}
    .search-box input{width:220px;padding:7px 12px 7px 30px;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
    .search-box input:focus{border-color:var(--accent)}
    .search-box .icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4}
    .main{flex:1;display:flex;overflow:hidden;position:relative}
    .graph-container{flex:1;position:relative}
    .graph-container svg{display:block;width:100%;height:100%}
    .legend{position:absolute;bottom:16px;left:16px;background:rgba(17,24,39,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:11px;z-index:5}
    .legend-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
    .legend-grid{display:flex;gap:20px}
    .legend-col{display:flex;flex-direction:column;gap:5px}
    .legend-item{display:flex;align-items:center;gap:8px;color:var(--text-muted)}
    .legend-node{width:12px;height:12px;border-radius:50%}
    .legend-hint{font-size:9px;color:var(--text-dim);margin-top:6px}
    .tooltip{position:absolute;top:16px;right:320px;background:rgba(17,24,39,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:12px 16px;max-width:280px;pointer-events:none;z-index:5;opacity:0;transform:translateY(-4px);transition:opacity .15s,transform .15s}
    .tooltip.visible{opacity:1;transform:translateY(0)}
    .tooltip-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .tooltip-dot{width:10px;height:10px;border-radius:50%}
    .tooltip-name{font-weight:700;font-size:14px}
    .tooltip-meta{font-size:11px;color:var(--text-muted);line-height:1.4}
    .detail-panel{width:300px;min-width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg-card);padding:20px;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease-out;z-index:5}
    .detail-panel.open{transform:translateX(0)}
    .detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
    .detail-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
    .detail-name{font-size:15px;font-weight:700}
    .detail-type{margin-top:2px;font-size:11px;color:var(--text-dim)}
    .close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px}
    .close-btn:hover{color:var(--text)}
    .info-box{padding:12px 14px;background:var(--bg-panel);border-radius:10px;margin-bottom:12px}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:4px}
    .info-value{font-size:13px;line-height:1.5}
    .conn-list{display:flex;flex-direction:column;gap:6px}
    .conn-item{padding:10px 12px;background:var(--bg-panel);border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
    .conn-item:hover{background:rgba(58,74,108,.3)}
    .conn-bar{width:4px;height:24px;border-radius:2px;flex-shrink:0}
    .conn-name{font-size:13px;font-weight:500}
    .conn-type{font-size:10px;color:var(--text-dim)}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .stat-box{text-align:center;padding:8px 4px;background:rgba(10,15,26,.5);border-radius:6px}
    .stat-value{font-size:18px;font-weight:700;color:var(--accent)}
    .stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
    .loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:20;transition:opacity .5s}
    .loading-overlay.hidden{opacity:0;pointer-events:none}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:14px;font-size:13px;color:var(--text-muted)}
    .tag{display:inline-block;background:rgba(99,102,241,.2);color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:10px;margin:2px 2px 2px 0}
    @media(max-width:768px){.header{padding:10px 14px}.header h1{font-size:14px}.search-box input{width:140px}.detail-panel{width:260px;min-width:260px}.legend{bottom:10px;left:10px;padding:10px 14px}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📝</div>
      <div><h1>Obsidian Vault Graph</h1><div class="subtitle">Interactive note visualization</div></div>
    </div>
    <div class="header-right">
      <div class="search-box"><span class="icon">🔍</span><input type="text" id="searchInput" placeholder="Search notes by title or folder..." /></div>
    </div>
  </div>
  <div class="main">
    <div class="graph-container" id="graphContainer">
      <svg id="graphSvg"></svg>
      <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">Loading vault data...</div></div>
      <div class="legend">
        <div class="legend-title">Legend</div>
        <div class="legend-grid">
          <div class="legend-col" id="folderLegend"></div>
          <div class="legend-col">
            <div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#aaaaaa" stroke-width="2"/></svg>Wiki link</div>
            <div class="legend-item"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/></svg>Broken link</div>
          </div>
        </div>
        <div class="legend-hint">Drag nodes · Scroll to zoom · Click for details</div>
      </div>
      <div class="tooltip" id="tooltip">
        <div class="tooltip-header"><div class="tooltip-dot" id="tooltipDot"></div><span class="tooltip-name" id="tooltipName"></span></div>
        <div class="tooltip-meta" id="tooltipMeta"></div>
      </div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="detail-icon" id="detailIcon"></div>
          <div><div class="detail-name" id="detailName"></div><div class="detail-type" id="detailType"></div></div>
        </div>
        <button class="close-btn" id="detailClose">✕</button>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div id="tagsBox" class="info-box" style="display:none"><div class="section-label">Tags</div><div id="tagsContent"></div></div>
      <div class="section-label" id="connLabel">Connections (0)</div>
      <div class="conn-list" id="connList"></div>
    </div>
  </div>
  <script>
    // --- CONFIG ---
    const FOLDER_COLORS = [
      '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981',
      '#06b6d4', '#f97316', '#6366f1', '#14b8a6', '#e879f9'
    ];
    const folderColorMap = {};
    let colorIdx = 0;

    function getFolderColor(folder) {
      const key = folder || '(root)';
      if (!folderColorMap[key]) {
        folderColorMap[key] = FOLDER_COLORS[colorIdx % FOLDER_COLORS.length];
        colorIdx++;
      }
      return folderColorMap[key];
    }

    function nodeRadius(d) {
      return Math.max(6, Math.min(22, 6 + d.link_count * 3));
    }

    // --- STATE ---
    let graphData = null;
    let selectedNode = null;
    let simulation = null;

    // --- LOAD DATA ---
    async function loadData() {
      const r = await fetch('graph-data.json');
      if (!r.ok) throw new Error('Failed to load: ' + r.status);
      return r.json();
    }

    // --- RENDER GRAPH ---
    function renderGraph(data) {
      graphData = data;
      const container = document.getElementById('graphContainer');
      const width = container.clientWidth;
      const height = container.clientHeight;

      const svg = d3.select('#graphSvg')
        .attr('width', width)
        .attr('height', height);
      svg.selectAll('*').remove();

      // Defs for glow filter
      const defs = svg.append('defs');
      const glow = defs.append('filter')
        .attr('id', 'glow').attr('x', '-50%').attr('y', '-50%')
        .attr('width', '200%').attr('height', '200%');
      glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
      const merge = glow.append('feMerge');
      merge.append('feMergeNode').attr('in', 'blur');
      merge.append('feMergeNode').attr('in', 'SourceGraphic');

      // Main group for zoom/pan
      const g = svg.append('g');
      const zoom = d3.zoom().scaleExtent([0.2, 4])
        .on('zoom', e => g.attr('transform', e.transform));
      svg.call(zoom);

      // Prepare nodes
      const nodes = data.nodes.map(n => ({
        ...n,
        radius: nodeRadius(n),
        color: getFolderColor(n.folder)
      }));

      // Prepare edges (broken targets get a phantom node)
      const nodeIds = new Set(nodes.map(n => n.id));
      const phantomNodes = [];
      data.edges.forEach(e => {
        if (!nodeIds.has(e.target)) {
          phantomNodes.push({
            id: e.target, title: e.target, folder: '(broken)',
            tags: [], link_count: 0, radius: 5, color: '#ef4444',
            phantom: true
          });
          nodeIds.add(e.target);
        }
      });
      const allNodes = nodes.concat(phantomNodes);

      const links = data.edges.map(e => ({
        source: e.source,
        target: e.target,
        type: e.type
      }));

      // Force simulation
      simulation = d3.forceSimulation(allNodes)
        .force('link', d3.forceLink(links).id(d => d.id)
          .distance(d => d.type === 'broken' ? 80 : 120)
          .strength(0.4))
        .force('charge', d3.forceManyBody().strength(-400).distanceMax(400))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.radius + 14))
        .force('x', d3.forceX(width / 2).strength(0.04))
        .force('y', d3.forceY(height / 2).strength(0.04));

      // Draw links
      const link = g.append('g').selectAll('line')
        .data(links).join('line')
        .attr('stroke', d => d.type === 'broken' ? '#ef4444' : '#aaaaaa')
        .attr('stroke-width', d => d.type === 'broken' ? 1.5 : 2)
        .attr('stroke-dasharray', d => d.type === 'broken' ? '5,4' : null)
        .attr('stroke-opacity', 0.5);

      // Draw nodes
      const node = g.append('g').selectAll('g')
        .data(allNodes).join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      // Node circles
      node.append('circle')
        .attr('r', d => d.radius)
        .attr('fill', d => d.color + (d.phantom ? '33' : '22'))
        .attr('stroke', d => d.color)
        .attr('stroke-width', d => d.phantom ? 1 : 2)
        .attr('stroke-dasharray', d => d.phantom ? '3,3' : null)
        .attr('filter', 'url(#glow)');

      // Inner dot
      node.append('circle')
        .attr('r', d => d.phantom ? 2 : Math.max(3, d.radius * 0.3))
        .attr('fill', d => d.color)
        .attr('opacity', 0.8);

      // Labels
      node.append('text')
        .text(d => d.title || d.id)
        .attr('text-anchor', 'middle')
        .attr('dy', d => d.radius + 14)
        .attr('fill', '#e8edf5')
        .attr('font-size', '11px')
        .attr('font-weight', '500')
        .attr('paint-order', 'stroke')
        .attr('stroke', '#0a0f1a')
        .attr('stroke-width', 3);

      // Hover
      node.on('mouseenter', function(event, d) {
        if (selectedNode) return;
        showTooltip(d);
        d3.select(this).select('circle').transition().duration(200)
          .attr('r', d.radius * 1.15);
        link.transition().duration(200)
          .attr('stroke-opacity', l =>
            (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id ? 0.9 : 0.08);
        node.transition().duration(200)
          .attr('opacity', n => {
            if (n.id === d.id) return 1;
            return links.some(l =>
              ((l.source.id || l.source) === d.id && (l.target.id || l.target) === n.id) ||
              ((l.target.id || l.target) === d.id && (l.source.id || l.source) === n.id)
            ) ? 1 : 0.2;
          });
      });

      node.on('mouseleave', function(event, d) {
        if (selectedNode) return;
        hideTooltip();
        d3.select(this).select('circle').transition().duration(200)
          .attr('r', d.radius);
        link.transition().duration(200).attr('stroke-opacity', 0.5);
        node.transition().duration(200).attr('opacity', 1);
      });

      // Click
      node.on('click', (event, d) => {
        event.stopPropagation();
        showDetail(d);
      });
      svg.on('click', () => hideDetail());

      // Tick
      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });

      // Initial zoom
      setTimeout(() => {
        svg.transition().duration(800).call(
          zoom.transform,
          d3.zoomIdentity.translate(width * 0.05, height * 0.05).scale(0.9)
        );
      }, 500);

      // Store refs for search
      window._graphRefs = { node, link, links, allNodes };
    }

    // --- TOOLTIP ---
    function showTooltip(d) {
      document.getElementById('tooltipDot').style.background = d.color;
      document.getElementById('tooltipName').textContent = d.title || d.id;
      const meta = (d.folder || 'Root') + ' \u00b7 ' + d.link_count + ' link' + (d.link_count !== 1 ? 's' : '') +
        (d.phantom ? ' \u00b7 Broken target' : '') + ' \u00b7 Click for details';
      document.getElementById('tooltipMeta').textContent = meta;
      document.getElementById('tooltip').classList.add('visible');
    }
    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    // --- DETAIL PANEL ---
    function showDetail(d) {
      selectedNode = d;
      hideTooltip();
      const panel = document.getElementById('detailPanel');
      const icon = document.getElementById('detailIcon');
      icon.style.border = '2.5px solid ' + d.color;
      icon.style.background = d.color + '22';
      icon.textContent = d.phantom ? '\u26a0' : '\u25c9';
      document.getElementById('detailName').textContent = d.title || d.id;
      document.getElementById('detailType').textContent = d.phantom ? 'Broken link target' : (d.folder || 'Root');

      // Stats
      document.getElementById('statsGrid').innerHTML = [
        { label: 'Links', value: d.link_count, color: d.color },
        { label: 'Folder', value: d.folder ? d.folder.split('/').pop() : 'Root', color: d.color }
      ].map(s => '<div class="stat-box"><div class="stat-value" style="color:' + s.color + '">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>').join('');

      // Tags
      const tagsBox = document.getElementById('tagsBox');
      if (d.tags && d.tags.length > 0) {
        tagsBox.style.display = 'block';
        document.getElementById('tagsContent').innerHTML = d.tags.map(t => '<span class="tag">#' + t + '</span>').join('');
      } else {
        tagsBox.style.display = 'none';
      }

      // Connections
      const conns = graphData.edges.filter(e => {
        const sid = e.source.id || e.source;
        const tid = e.target.id || e.target;
        return sid === d.id || tid === d.id;
      });
      document.getElementById('connLabel').textContent = 'Connections (' + conns.length + ')';
      const connList = document.getElementById('connList');
      connList.innerHTML = '';
      conns.forEach(conn => {
        const sid = conn.source.id || conn.source;
        const tid = conn.target.id || conn.target;
        const otherId = sid === d.id ? tid : sid;
        const other = graphData.nodes.find(n => n.id === otherId);
        const name = other ? (other.title || other.id) : otherId;
        const isBroken = conn.type === 'broken';
        const item = document.createElement('div');
        item.className = 'conn-item';
        item.innerHTML =
          '<div class="conn-bar" style="background:' + (isBroken ? '#ef4444' : '#aaaaaa') + '"></div>' +
          '<div><div class="conn-name">' + name + '</div>' +
          '<div class="conn-type">' + (sid === d.id ? '\u2192' : '\u2190') + ' ' + conn.type + (isBroken ? ' (missing)' : '') + '</div></div>';
        if (other) {
          item.addEventListener('click', () => {
            const otherNode = window._graphRefs?.allNodes.find(n => n.id === otherId);
            if (otherNode) showDetail(otherNode);
          });
        }
        connList.appendChild(item);
      });

      panel.classList.add('open');
    }

    function hideDetail() {
      selectedNode = null;
      document.getElementById('detailPanel').classList.remove('open');
      if (window._graphRefs) {
        window._graphRefs.node.transition().duration(200).attr('opacity', 1);
        window._graphRefs.link.transition().duration(200).attr('stroke-opacity', 0.5);
      }
    }

    // --- SEARCH ---
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      if (!window._graphRefs) return;
      window._graphRefs.node.transition().duration(200)
        .attr('opacity', d => {
          if (!q) return 1;
          const name = (d.title || d.id || '').toLowerCase();
          const folder = (d.folder || '').toLowerCase();
          return name.includes(q) || folder.includes(q) ? 1 : 0.1;
        });
      window._graphRefs.link.transition().duration(200)
        .attr('stroke-opacity', l => {
          if (!q) return 0.5;
          const sn = (l.source.title || l.source.id || '').toLowerCase();
          const tn = (l.target.title || l.target.id || '').toLowerCase();
          const sf = (l.source.folder || '').toLowerCase();
          const tf = (l.target.folder || '').toLowerCase();
          return (sn.includes(q) || tn.includes(q) || sf.includes(q) || tf.includes(q)) ? 0.5 : 0.05;
        });
    });

    // --- CLOSE PANEL ---
    document.getElementById('detailClose').addEventListener('click', hideDetail);

    // --- RESIZE ---
    window.addEventListener('resize', () => { if (graphData) renderGraph(graphData); });

    // --- LEGEND ---
    function buildLegend() {
      const el = document.getElementById('folderLegend');
      el.innerHTML = '';
      Object.entries(folderColorMap).forEach(([folder, color]) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<div class="legend-node" style="border:2px solid ' + color + ';background:' + color + '22"></div>' + folder;
        el.appendChild(item);
      });
    }

    // --- BOOT ---
    (async () => {
      try {
        const data = await loadData();
        data.nodes.forEach(n => getFolderColor(n.folder));
        renderGraph(data);
        buildLegend();

        const m = data.metadata;
        const statsEl = document.createElement('div');
        statsEl.style.cssText = 'margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim)';
        statsEl.innerHTML = m.total_notes + ' notes \u00b7 ' + m.total_links + ' links \u00b7 ' +
          m.folders.length + ' folders \u00b7 ' + m.orphan_notes.length + ' orphans \u00b7 ' +
          m.broken_links.length + ' broken';
        document.querySelector('.legend').appendChild(statsEl);

        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.add('hidden');
        }, 600);
      } catch (err) {
        document.getElementById('loadingOverlay').innerHTML =
          '<div style="color:#ef4444;font-size:14px">Error: ' + err.message + '</div>';
      }
    })();
  </script>
</body>
</html>
